<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" width="200" height="260">
  <defs>
    <!-- Nova Hospital Original Colors -->
    <linearGradient id="handsGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4c4"/>
      <stop offset="50%" style="stop-color:#00bcd4"/>
      <stop offset="100%" style="stop-color:#0097a7"/>
    </linearGradient>
    
    <linearGradient id="crossMainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d"/>
      <stop offset="50%" style="stop-color:#2c5282"/>
      <stop offset="100%" style="stop-color:#3182ce"/>
    </linearGradient>
    
    <linearGradient id="crossCenterGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4299e1"/>
      <stop offset="50%" style="stop-color:#3182ce"/>
      <stop offset="100%" style="stop-color:#2c5282"/>
    </linearGradient>
  </defs>
  
  <!-- Caring Hands - Original Design -->
  <g>
    <!-- Left Hand -->
    <path d="M30 120 Q15 110 10 130 Q5 150 20 160 L55 180 Q70 190 80 175 Q85 160 70 150 L45 135 Q35 125 30 120 Z" 
          fill="url(#handsGradient)" opacity="0.9"/>
    
    <!-- Right Hand -->
    <path d="M170 120 Q185 110 190 130 Q195 150 180 160 L145 180 Q130 190 120 175 Q115 160 130 150 L155 135 Q165 125 170 120 Z" 
          fill="url(#handsGradient)" opacity="0.9"/>
  </g>
  
  <!-- Medical Cross with Stethoscope - Original Nova Design -->
  <g transform="translate(100,80)">
    <!-- Cross Background -->
    <rect x="-28" y="-40" width="56" height="80" rx="18" fill="url(#crossMainGradient)"/>
    <rect x="-40" y="-28" width="80" height="56" rx="18" fill="url(#crossMainGradient)"/>
    
    <!-- Cross Center -->
    <rect x="-25" y="-37" width="50" height="74" rx="15" fill="url(#crossCenterGradient)"/>
    <rect x="-37" y="-25" width="74" height="50" rx="15" fill="url(#crossCenterGradient)"/>
    
    <!-- Stethoscope Design - White Medical Symbol -->
    <g fill="#ffffff" stroke="#ffffff">
      <!-- Stethoscope ear pieces -->
      <path d="M-20 -35 Q-30 -25 -22 -18 Q-18 -15 -15 -18" fill="none" stroke-width="3" stroke-linecap="round"/>
      <path d="M20 -35 Q30 -25 22 -18 Q18 -15 15 -18" fill="none" stroke-width="3" stroke-linecap="round"/>
      
      <!-- Stethoscope connection tubes -->
      <path d="M-15 -18 Q-8 -10 0 -8 Q8 -10 15 -18" fill="none" stroke-width="3" stroke-linecap="round"/>
      
      <!-- Central medical symbol -->
      <path d="M-8 -5 L8 -5 M0 -13 L0 3" stroke-width="4" stroke-linecap="round"/>
      
      <!-- Chest piece -->
      <circle cx="0" cy="12" r="9" fill="#ffffff"/>
      <circle cx="0" cy="12" r="5" fill="url(#crossMainGradient)"/>
    </g>
  </g>
  
  <!-- NOVA HOSPITAL Text - Original Typography -->
  <text x="100" y="170" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" 
        font-size="38" fill="#1a365d" letter-spacing="-2px">NOVA</text>
  <text x="100" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" 
        font-size="22" fill="#00bcd4" letter-spacing="6px">HOSPITAL</text>
</svg>